# =============================================================================
# dynamics_pipeline — Unified Configuration
# =============================================================================
# Controls all phases of the brain dynamics analysis pipeline.
# See README.md for detailed documentation of each phase and parameter.
#
# Quick start:
#   python -m dynamics_pipeline.run --model best_model.pt --graph graph.pt
#
# Quick mode (reduced parameters for fast iteration):
#   python -m dynamics_pipeline.run --model best_model.pt --graph graph.pt --quick
# =============================================================================

# ── Model & Data ─────────────────────────────────────────────────────────────
model:
  path: null                    # Required: path to best_model.pt
  graph_path: null              # Required: path to graph cache .pt file
  config_path: null             # Optional: training config.yaml (auto-detected)
  device: "auto"                # "auto" | "cuda" | "cpu"
  # Cross-modal edges per EEG electrode added when rebuilding graph structure
  # for inference (see API.md §2.5).  Increase if EEG→fMRI signal is weak.
  k_cross_modal: 5

# ── Simulator ────────────────────────────────────────────────────────────────
simulator:
  # Which brain-data stream(s) to analyse:
  # - "fmri"  : fMRI BOLD stream only (default).
  # - "eeg"   : EEG stream only.
  # - "both"  : run all phases independently for each modality available in
  #             the graph cache.  Outputs to output_dir/fmri/ and
  #             output_dir/eeg/.  Requires both node types.
  # - "joint" : single pipeline run using a COMBINED fMRI+EEG state vector.
  #             Each modality's predictions are z-score normalised and
  #             concatenated: [z_fmri | z_eeg].  Produces a single set of
  #             dynamics metrics reflecting joint multi-scale brain state.
  #             Requires both 'fmri' and 'eeg' nodes in the graph cache.
  #             Note: joint mode always forces Lyapunov method='rosenstein'
  #             (Wolf/FTLE clips z-score space to [0,1] → spurious attractors).
  modality: "fmri"
  # Internal fMRI sub-sampling factor (kept for compatibility; model infers
  # dt from the graph cache automatically).
  fmri_subsample: 25
  # Amplitude normalisation (useful for diagnosing joint-mode spectral radius >> 1).
  # When true, each state vector x(t) of every generated trajectory is normalised
  # to unit L2 norm after Phase 1: x_hat(t) = x(t) / ||x(t)||₂.
  # This removes the amplitude dimension and studies direction-only dynamics.
  # Expected effects:
  #   - DMD spectral radius typically decreases toward ≤1 (amplitude no longer
  #     inflates the linear operator).
  #   - Rosenstein LLE measures divergence on the unit sphere; near-critical
  #     behaviour may be preserved or slightly altered.
  # Use to isolate whether joint-mode ρ>>1 is amplitude-driven or structure-driven.
  # Default: false (preserve original amplitude information for all analyses).
  normalize_amplitude: false

# ── Phase 1: Data Generation ────────────────────────────────────────────────
data_generation:
  n_init: 100                   # Number of random initial trajectories
  steps: 500                    # Prediction steps per trajectory (fMRI TRs)
  seed: 42
  # Number of sliding context windows used for free-dynamics rollouts.
  # null = auto-compute from trajectory length (recommended).
  # Set explicitly to limit distinct historical contexts (saves memory).
  n_temporal_windows: null

# ── Phase 2: Network Structure ──────────────────────────────────────────────
# Analyses the connectivity/response matrix for structural properties.
network_structure:
  enabled: true
  spectral:
    enabled: true               # Eigenvalue decomposition, participation ratio, ρ(W)
  community:
    enabled: true               # Louvain/spectral community detection
    k_range: [3, 4, 5, 6, 7, 8]
    n_null: 100                 # Null networks for Q significance test (0 = skip)
                                # Strategy auto-selected by matrix density:
                                #   sparse (≤50% non-zero): Maslov-Sneppen degree-
                                #     preserving rewiring (preserves strength sequence)
                                #   dense  (>50% non-zero, typical for brain FC):
                                #     weight-permutation null model (randomises which
                                #     node-pairs carry which weights; Maslov-Sneppen
                                #     is inapplicable — all swaps rejected for dense graphs)
  hierarchy:
    enabled: false              # Hierarchical clustering dendrogram
  modal_energy:
    enabled: true               # Modal projection & energy distribution
  visualization:
    enabled: true               # Connectivity heatmaps

# ── Phase 3: Dynamics Characterization ──────────────────────────────────────
# Characterises the dynamical regime from trajectory data.
dynamics:
  stability:
    enabled: true               # Stability classification (Method C: adaptive)
    delay_dt: 50                # Delay lag for distance method
  attractor:
    enabled: true               # KMeans attractor basin analysis
    tail_steps: 50              # Final steps for clustering
    k_candidates: [2, 3, 4, 5, 6]
  convergence:
    enabled: true               # Pairwise trajectory convergence
    n_pairs: 50
  lyapunov:
    enabled: true               # LLE estimation
    # Method: "rosenstein" (default, zero extra model calls, recommended),
    # "wolf", "ftle", or "both".
    # joint modality always forces "rosenstein" automatically.
    method: "rosenstein"
    max_lag: 50                 # Maximum tracking lag
    min_sep: 20                 # Minimum temporal separation for NN search
    n_segments: 3               # Multi-segment sampling (early/mid/late)
    convergence_threshold: 0.05 # Distance ratio threshold for stable shortcut
    delay_embed_dim: 0          # 0=disabled; after running Phase 4c (embedding dimension),
                                # set this to the FNN min_sufficient_dim for better NN quality
    delay_embed_tau: 1          # Delay embedding lag
    # Parallel workers for Wolf/FTLE (1 = sequential, recommended for GPU).
    # CLI: --n-workers N to override.
    n_workers: 1
  dmd_spectrum:
    enabled: true               # DMD linearised spectral analysis
    tail_steps: 20              # Final trajectory steps for attractor state sampling
    n_states: 3                 # Number of attractor states to analyse
  power_spectrum:
    enabled: true               # FFT power spectral density & band analysis
  pca:
    enabled: true               # PCA dimensionality (variance curve)
  attractor_dimension:
    enabled: true               # D₂ (correlation dim) + linearised K-Y from DMD
    d2:
      enabled: true             # D₂ robustness: multi-trajectory/window distribution
      k_traj: 10                # Trajectories sampled for D₂
      m_windows: 5              # Windows per trajectory
      window_len: 300           # Segment length (steps); capped to available T
      burnin_fraction: 0.10     # Skip initial fraction of each trajectory
      min_r2: 0.90              # Minimum R² to accept a D₂ estimate
      seed: 42

  # ── Experiment 1: Full Lyapunov Spectrum ──────────────────────────────────
  # Extracts the complete linearised Lyapunov spectrum from DMD eigenvalues
  # and assesses whether the system exhibits strange attractor dynamics.
  # Zero extra model calls (uses DMD from Phase 3e).
  # Outputs: lyapunov_spectrum.npy, lyapunov_spectrum_report.json
  lyapunov_spectrum:
    enabled: true               # Always enabled if Phase 3e (dmd_spectrum) runs

  # ── Experiment 3: Node Contribution Analysis ──────────────────────────────
  # Identifies which brain regions are the primary drivers of the
  # low-dimensional dynamical manifold.
  # Zero extra model calls (PCA on trajectories + DMD slow modes + response matrix).
  # Outputs: node_contribution_rank.csv, top_nodes_report.json
  node_contribution:
    enabled: true
    top_k: 20                   # Top-k nodes to report in detail
    n_pca_components: 10        # Number of PCA components for loading

  # ── Experiment 2: Attractor Basin Test (OPTIONAL, expensive) ──────────────
  # Tests for a single global attractor using diverse initial conditions
  # (task states / Gaussian random / uniform random).
  # Requires n_diverse × 3 × T extra model calls — disabled by default.
  # Outputs: basin_pca_projection.npy, basin_cluster_report.json
  basin_test:
    enabled: false
    n_diverse: 50               # Trajectories per initialisation type
    T: 300                      # Prediction steps
    tail_steps: 50              # Steps for tail-state extraction
    dominant_thresh: 0.75       # Fraction threshold for "single attractor"

# ── Phase 4: Statistical Validation ─────────────────────────────────────────
validation:
  surrogate_test:
    enabled: true               # Surrogate data testing (nonlinearity significance)
    n_surrogates: 19            # 19 → rank test p < 0.05
    types: ["phase_randomize", "shuffle", "ar"]
    n_traj_sample: 5
  random_comparison:
    enabled: true               # Random network baseline comparison
    spectral_radii: [0.9, 1.5, 2.0]  # stable / critical / chaotic
    n_seeds: 5
  embedding_dimension:
    enabled: true               # FNN analysis, correlation dimension, Takens check
    fnn_max_dim: 8
    corr_dim: true
    check_leakage: true
    train_fraction: 0.7
  intrinsic_dimension:
    enabled: true               # TwoNN local intrinsic dimension (P1-1)
    k_traj: 10                  # Trajectories sampled for estimation
    burnin_fraction: 0.10       # Skip initial fraction of each trajectory
    max_points: 2000            # Max points per segment for kNN search
  perturbation:
    enabled: false              # Structural perturbation (weight shuffle, rewire)

  # ── Experiment 5: Hub Perturbation (OPTIONAL) ─────────────────────────────
  # Remove top-k hub nodes from connectivity matrix, recompute spectral metrics.
  # Tests whether hub nodes control the dynamical manifold.
  # No extra model calls (operates on response matrix or FC).
  # Outputs: hub_perturbation_report.json
  hub_perturbation:
    enabled: false
    top_k_list: [5, 10]         # Number of hub nodes to remove in each condition

  # ── Experiment 6: Weight Randomisation (OPTIONAL) ─────────────────────────
  # Shuffle edge weights while preserving sparsity pattern (topology).
  # Tests whether weight structure (not just topology) determines dynamics.
  # No extra model calls.
  # Outputs: weight_randomisation_report.json
  weight_randomisation:
    enabled: false
    n_shuffles: 5               # Number of independent permutations

  # ── Experiment 7: Subnetwork Scaling (OPTIONAL) ──────────────────────────
  # Extract random subnetworks of different sizes and verify dynamics stability.
  # Tests scale invariance — whether results generalise beyond full-graph size.
  # No extra model calls.
  # Outputs: subnetwork_scaling_report.json
  subnetwork_scaling:
    enabled: false
    scales: [120, 160, 200]     # Subnetwork sizes (auto-adjusted to < N)
    n_subnetworks: 10           # Random subnetworks per scale

  # ── Experiment 4: Structure-Preserving Random Network (OPTIONAL) ──────────
  # Generate random networks preserving sparsity + weight magnitude distribution
  # but with rewired connections. Complements the existing random_comparison.
  # No extra model calls.
  # Outputs: random_network_report.json
  structure_preserving_random:
    enabled: false
    n_random: 5                 # Number of random realisations

  # ── TASK 1: Graph Structure Comparison (OPTIONAL) ─────────────────────────
  # Compares brain graph vs degree-preserving-rewired and fully-random baselines
  # using analytical spectral metrics + GNN-derived LLE/D2 (no extra model calls).
  # Outputs: random_graph_comparison.csv, random_graph_dynamics.png
  graph_structure_comparison:
    enabled: false
    n_random: 5                 # Realisations of each random baseline to average

  # ── TASK 2: Input Dimension Control (OPTIONAL) ────────────────────────────
  # Tests whether low-dimensional dynamics come from network structure vs input.
  # Three conditions on GNN trajectories: no input / high-dim noise / 3-D drive.
  # No extra model calls.
  # Outputs: input_dimension_results.csv, input_dimension_plot.png
  input_dimension_control:
    enabled: false
    noise_sigma: 0.5            # Noise amplitude for condition B
    low_dim_k: 3                # Dimensionality of structured drive in condition C

  # ── TASK 4: Node Ablation (OPTIONAL) ──────────────────────────────────────
  # Ranks nodes by manifold-deformation impact (trajectory-space masking).
  # No extra model calls.
  # Outputs: node_importance.csv, node_importance_hist.png
  node_ablation:
    enabled: false
    n_top_variance: 50          # High-variance nodes to always include
    n_random_sample: 50         # Random control nodes

  # ── TASK 7: Predictive Dimension (OPTIONAL) ───────────────────────────────
  # VAR(1) predictor MSE/AIC/BIC across PCA dimensions m=1..max_dim.
  # Optimal m should coincide with D2 if attractor dimension drives predictability.
  # No extra model calls.
  # Outputs: predictive_dimension.csv, aic_curve.png
  predictive_dimension:
    enabled: false
    max_dim: 10                 # Maximum PCA dimension evaluated
    train_fraction: 0.70        # Training fraction for each trajectory

# ── Phase 5: Advanced (optional, expensive) ─────────────────────────────────
advanced:
  stimulation:
    enabled: true               # Virtual stimulation experiments
    target_nodes: [0, 100]
    amplitude: 0.5
    frequency: 10.0
    duration: 30                # Steps
    patterns: ["sine"]
  response_matrix:
    enabled: true               # Full N×N stimulation response matrix
    n_nodes: 10                 # Source nodes to stimulate.
                                # Set to null (or omit) for all N nodes — recommended for
                                # full Phase-2 spectral/community analysis (requires N×N matrix)
                                # but significantly slower (O(N) model calls vs O(n_nodes)).
    stim_amplitude: 0.5
  energy_constraint:
    enabled: true               # Energy budget analysis from trajectories
  phase_diagram:
    enabled: false              # g-sweep phase diagram
  controllability:
    enabled: false              # Network controllability (AC/MC/BC)
  information_flow:
    enabled: false              # Transfer entropy
    n_source_regions: 20
    n_target_regions: 20
  critical_slowing_down:
    enabled: true               # Early warning signals (H3 evidence, enabled by default)

  # ── TASK 5: Lesion Dynamics (OPTIONAL) ────────────────────────────────────
  # Temporal lesion: clamp top-ablation nodes at t=lesion_step in GNN trajectories.
  # Requires node_ablation (4l) to be enabled first (uses its top_nodes ranking).
  # No extra model calls.
  # Outputs: lesion_effects.csv, lesion_examples.png
  lesion_dynamics:
    enabled: false
    n_lesion_nodes: 10          # Top nodes from ablation to lesion
    n_control: 10               # Random control nodes
    lesion_step: 500            # Time step at which lesion is applied

  # ── TASK 6: Granger Causality (OPTIONAL) ──────────────────────────────────
  # Pairwise bivariate Granger causality on GNN trajectories.
  # Complements Transfer Entropy (5e). Identifies sources, sinks, net-flow.
  # Outputs: granger_flow.csv, causal_network.png, granger_report.json
  granger_causality:
    enabled: false
    max_lag: 1                  # VAR lag order
    n_src: null                 # Source block size (null = all N, slow for large N)
    n_tgt: null                 # Target block size (null = all N)
    top_k: 20                   # Top sources/sinks to report

# ── Output ───────────────────────────────────────────────────────────────────
output:
  directory: "outputs/dynamics_pipeline"
  save_trajectories: true
  save_plots: true

# ── Quick mode presets (applied via --quick flag) ────────────────────────────
# These are NOT read directly; they are applied programmatically by run.py.
# Listed here for documentation only.
# quick_overrides:
#   data_generation: { n_init: 20, steps: 100 }
#   advanced.response_matrix: { n_nodes: 10 }
#   validation.surrogate_test: { n_surrogates: 9, n_traj_sample: 3 }
#   validation.embedding_dimension: { fnn_max_dim: 4, corr_dim: false }
