# TwinBrain Dynamics Analysis Configuration
# ==========================================
# Loaded by run_dynamics_analysis.py

# Model configuration
model:
  path: null          # Path to trained .pt checkpoint; null = no model (Wilson-Cowan fallback)
  device: "auto"      # "auto" → CUDA if available, else CPU; or "cpu" / "cuda"

# Simulator configuration
simulator:
  # Internal time step aligned to EEG sampling rate (seconds)
  # EEG is typically 250-1000 Hz; fMRI is downsampled to this grid.
  dt: 0.004           # 4 ms → 250 Hz EEG grid
  fmri_subsample: 25  # observe fMRI every N steps (100 ms at 250 Hz → ~0.1s TR)
  n_regions: 200      # Number of brain regions (Schaefer 200-parcel atlas)

# Free dynamics experiment
free_dynamics:
  n_init: 200         # Number of random initial states to simulate
  steps: 1000         # Simulation steps per trajectory
  seed: 42            # Random seed for reproducibility
  # Quick pre-experiment hint: --quick sets n_init=20, steps=200 (10× / 5× faster)

# Attractor analysis
attractor_analysis:
  tail_steps: 100     # Number of final steps used to compute attractor state
  k_candidates: [2, 3, 4, 5, 6]  # Range of K to test for KMeans
  k_best: 3           # Final K for reporting basin distribution
  dbscan_eps: 0.5     # Epsilon for DBSCAN (alternative method)
  dbscan_min_samples: 5

# Virtual stimulation experiment
virtual_stimulation:
  # Nodes to stimulate — default: frontal hub regions
  target_nodes: [0, 100]
  frequency: 10.0     # Hz (for sinusoidal / square wave)
  amplitude: 0.5      # Normalised units
  duration: 200       # Stimulation duration (steps)
  pre_steps: 100      # Baseline steps before stimulation
  post_steps: 200     # Recovery steps after stimulation
  patterns:           # Which patterns to compare
    - sine
    - square
    - step

# Response matrix computation
response_matrix:
  n_nodes: 200        # Stimulate all N nodes
  stim_amplitude: 0.5
  stim_duration: 50   # Steps per node stimulation
  stim_frequency: 10.0
  stim_pattern: "sine"
  measure_window: 20  # Steps after stimulation onset to average response

# Stability analysis
stability_analysis:
  convergence_tol: 1e-4   # ||Δx|| < tol → classify as fixed point (method A)
  period_max_lag: 100     # Maximum lag to check for periodic orbits (method A)
  delay_dt: 50            # Delay lag for improved delay-distance classification (method B)

# Lyapunov exponent estimation
lyapunov:
  enabled: true
  # ── Method selection ──────────────────────────────────────────────────────
  # "rosenstein" (recommended default for TwinBrainDigitalTwin):
  #   Uses only the pre-computed free-dynamics trajectories — ZERO extra model
  #   calls.  Not affected by the Wolf context-dilution bias.
  #   Typical runtime: < 30 seconds for 200 trajectories × 1000 steps.
  #
  # "both": Wolf + FTLE + Rosenstein cross-validation.  Wolf requires 2 calls
  #   per renormalisation period × n_traj × n_segments.  With n_traj=200,
  #   steps=1000, renorm_steps=50 (20 periods/traj), n_segments=1:
  #   200 × 20 × 2 = ~8000 extra predict_future() calls → ~60 min on CPU.
  #   Wolf is ALWAYS biased for TwinBrainDigitalTwin (context dilution),
  #   so "both" is only useful for explicit bias quantification — the pipeline
  #   will auto-switch to Rosenstein for chaos classification anyway.
  #
  # "wolf" / "ftle": not recommended for TwinBrainDigitalTwin.
  method: "rosenstein"           # Changed from "both" — saves ~60 min of Wolf compute
  epsilon: 1.0e-6                # Nominal perturbation magnitude
  renorm_steps: 50               # Steps between Wolf renormalization periods
  skip_fraction: 0.1             # Fraction of trajectory to skip (transient, ftle only)
  # ── Convergence-first threshold ──────────────────────────────────────────
  # Skip Wolf if trajectory distance_ratio (final/initial distance) < this.
  # Raised from 0.01 to 0.05: the log showed distance_ratio=0.0102 being
  # missed by the strict < 0.01 check.  0.05 safely covers all strongly
  # converging systems (distance shrinks by 20× or more).
  convergence_threshold: 0.05    # Was 0.01; raised to catch boundary cases like ratio=0.010
  # ── Multi-segment sampling ────────────────────────────────────────────────
  # Number of trajectory segments to sample per trajectory.  For Rosenstein
  # this is essentially free (pure NumPy); 3 segments gives estimates at
  # early / mid / late attractor positions → more robust LLE.
  # For Wolf/FTLE, each extra segment adds 2 model calls per trajectory.
  n_segments: 3                  # Was 1; raised to 3 for Rosenstein (negligible cost)
  # ── Rosenstein parameters ────────────────────────────────────────────────
  rosenstein_max_lag: 50         # Max tracking lag (auto-reduced for short trajectories)
  rosenstein_min_sep: 20         # Min temporal separation for nearest-neighbour search
  # ── Takens delay embedding (improves Rosenstein NN quality) ─────────────
  # When delay_embed_dim >= 2, the trajectory is projected to a Takens delay-
  # embedded space (1st PC observable, m-dimensional) before Rosenstein NN
  # search.  This avoids the "curse of dimensionality" in N=190 dim space
  # where all point-pair distances are nearly equal.
  #
  # How to choose:
  #   1. Run the pipeline once with delay_embed_dim: 0 (default).
  #   2. Check step 12 (embedding dimension analysis): look for
  #      "FNN 最小充分维度 = N" in the log.  A typical value is 4–9.
  #   3. Set delay_embed_dim to that value and re-run step 9.
  #
  # From the sample log: FNN min dim = 4, Takens min = 9.  A safe choice
  # is 7 (satisfies Takens theorem 2D+1=9 with small safety margin from
  # the correlation dimension D₂=1.57 → 2×4+1=9, use 7).
  delay_embed_dim: 0             # 0 = disabled; set to FNN dim (e.g. 7) after step 12
  delay_embed_tau: 1             # Delay step (1 = use consecutive prediction steps)
  # ── Parallelism ──────────────────────────────────────────────────────────
  n_workers: 1                   # 1 = sequential; set >1 for multi-core Rosenstein
  # GPU acceleration note:
  #   - method="rosenstein": zero extra model calls, pure NumPy → safe to set
  #     n_workers=4~8 for CPU parallelism; on GPU the model is idle so no contention.
  #   - method="wolf"/"ftle"/"both": each worker calls the model; on GPU this
  #     causes VRAM contention → n_workers is automatically clamped to 1.
  #   - CLI override: python run_dynamics_analysis.py ... --n-workers 4

# Trajectory convergence analysis
trajectory_convergence:
  enabled: true
  n_pairs: 50             # Number of random trajectory pairs to compare

# Random model comparison
random_comparison:
  enabled: true
  n_init: 200             # Random initial states for random model
  steps: 1000             # Steps for random model trajectories
  spectral_radius: 0.9    # Target spectral radius of random weight matrix
  # Multiple radii: tanh chaos boundary is ρ≈1.5 for n≈190 (not linear ρ=1)
  spectral_radii: [0.9, 1.5, 2.0]   # stable / near-critical / chaotic
  n_seeds: 5              # Independent weight matrices per spectral radius

# Output configuration
output:
  directory: "outputs"
  save_trajectories: true
  save_attractors: true
  save_response_matrix: true
  save_stability_metrics: true
  save_plots: true

# Surrogate test — nonlinearity significance check (Step 11)
# 19 surrogates → rank-based p < 0.05; 99 surrogates → p < 0.01.
# Runtime: n_surrogates × n_traj_sample × rosenstein calls (pure NumPy).
surrogate_test:
  enabled: true
  n_surrogates: 19              # 19 surrogates → p < 0.05 (rank test)
  surrogate_types:              # Which surrogate methods to run
    - phase_randomize           # Destroys nonlinearity, preserves power spectrum
    - shuffle                   # Destroys all temporal structure
    - ar                        # Autoregressive surrogate (preserves linear structure)
  ar_order: 1                   # AR(p) order for ar_surrogate
  rosenstein_max_lag: 30        # Max lag for Rosenstein LLE in surrogate test
  rosenstein_min_sep: 10        # Min temporal separation for NN search
  n_traj_sample: 5              # Trajectories used (speed vs. precision trade-off)

# Embedding dimension & data leakage checks (Step 12)
# Controls intrinsic dimensionality estimation (FNN, D₂) and leakage warnings.
# Key params for EEG:
#   fnn_max_dim  — upper bound on FNN dimension scan (raise if FNN not saturating)
#   check_leakage — whether to run normalisation + PCA leakage checks
#   train_fraction — fraction of trajectories used as "training" reference for leakage tests
embedding_dimension:
  enabled: true
  fnn_max_dim: 8                # Max embedding dimension to test via FNN
  fnn_tau: 1                    # Delay lag for FNN (prediction steps)
  corr_dim: true                # Compute Grassberger-Procaccia correlation dimension D₂
  check_leakage: true           # Run normalisation + PCA leakage checks
  # Fraction of trajectories treated as "train" when checking leakage.
  # The remaining (1-train_fraction) trajectories are the "test" set.
  # A higher value reduces leakage risk but gives fewer test trajectories.
  train_fraction: 0.7           # 70% train / 30% test split for leakage estimation

# Power spectrum analysis (Step 13)
power_spectrum:
  enabled: true
  burnin: 10       # skip first N steps of each trajectory (transient)

# Jacobian spectrum analysis (Step 14) — EXPENSIVE: 2N+1 model calls per attractor state
# Enable only after confirming the system is near an attractor (step 7 shows "limit_cycle"
# or "fixed_point"). Runtime: ~N×n_states rollout(steps=1) calls = ~570 calls for N=190, n_states=3.
jacobian_analysis:
  enabled: false   # set true to enable
  tail_steps: 20   # attractor states from final tail_steps of trajectories
  n_states: 3      # number of attractor states to average Jacobian over
  epsilon: 1.0e-4  # finite difference step

# Step 15 [REMOVED]: Wolf-GS Lyapunov spectrum had unrecoverable context-dilution
# bias for TwinBrain.  Use dynamics_pipeline Phase 3e (DMD + K-Y) instead.
# The lyapunov_spectrum config section has been removed.

# Energy constraint experiment (Step 16) — zero extra model calls
# Analyses the energy distribution of the already-computed trajectories and
# recommends E_budget values for re-running the pipeline with
# --energy-budget X.  Does NOT run any additional simulations.
#
# Scientific rationale: the "correct" energy-constraint experiment is to run
# the full pipeline with different --energy-budget values and compare LLE /
# PCA across runs.  Scanning inside a single run would require n_alpha×n_init
# extra rollouts and is therefore intentionally NOT implemented here.
energy_constraint:
  enabled: false   # set true to characterise E* from the current trajectories
